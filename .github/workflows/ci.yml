name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sync_test
          POSTGRES_USER: sync_user
          POSTGRES_PASSWORD: sync_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint backend
      run: npm run lint --workspace=backend

    - name: Lint frontend
      run: npm run lint --workspace=frontend

    - name: Build backend
      run: npm run build --workspace=backend
      env:
        DATABASE_URL: postgresql://sync_user:sync_password@localhost:5432/sync_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        NODE_ENV: test

    - name: Build frontend
      run: npm run build --workspace=frontend

    - name: Test backend
      run: npm test --workspace=backend
      env:
        DATABASE_URL: postgresql://sync_user:sync_password@localhost:5432/sync_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        NODE_ENV: test

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: ${{ github.event_name == 'push' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/0sync-backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: ${{ github.event_name == 'push' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/0sync-frontend:latest

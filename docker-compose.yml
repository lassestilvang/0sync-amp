version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sync_db}
      POSTGRES_USER: ${DB_USER:-sync_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sync_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-sync_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-sync_user}:${DB_PASSWORD:-sync_password}@postgres:5432/${DB_NAME:-sync_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      API_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-00000000000000000000000000000000}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
    command: npm run dev -w backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/tailwind.config.js:/app/frontend/tailwind.config.js
      - ./frontend/postcss.config.js:/app/frontend/postcss.config.js
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json

volumes:
  postgres_data:

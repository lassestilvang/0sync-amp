apiVersion: apps/v1
kind: Deployment
metadata:
  name: 0sync-frontend
  namespace: 0sync
  labels:
    app: 0sync-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 0sync-frontend
  template:
    metadata:
      labels:
        app: 0sync-frontend
    spec:
      containers:
      - name: frontend
        image: YOUR_REGISTRY/0sync-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_URL
          value: "https://api.0sync.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101

---
apiVersion: v1
kind: Service
metadata:
  name: 0sync-frontend
  namespace: 0sync
  labels:
    app: 0sync-frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: 0sync-frontend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 0sync-frontend-hpa
  namespace: 0sync
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 0sync-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
